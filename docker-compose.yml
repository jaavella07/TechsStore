version: '3.9'

services:
  # ─── Base de datos ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: techsstore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techsstore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (BullMQ + Cache) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: techsstore_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BullMQ Dashboard ────────────────────────────────────
  bull-board:
    image: deadly0/bull-board
    container_name: techsstore_bull_board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3030:3000'
    depends_on:
      redis:
        condition: service_healthy

  # ─── API Principal ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: techsstore_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NOTIFICATIONS_HOST: notifications
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /app/node_modules

  # ─── Microservicio de Notificaciones ─────────────────────
  notifications:
    build:
      context: .
      dockerfile: apps/notifications/Dockerfile
    container_name: techsstore_notifications
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
